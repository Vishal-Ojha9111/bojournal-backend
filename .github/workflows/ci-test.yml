name: CI - Test

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bojournal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd django_backend
          python -m pip install --upgrade pip
          pip install -r requirements/testing.txt

      - name: Run tests
        run: |
          cd django_backend
          python manage.py test
        env:
          DJANGO_ENVIRONMENT: testing
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: bojournal_test
          DB_USER: postgres
          DB_PASSWORD: postgres
